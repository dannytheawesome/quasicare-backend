<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QuasiCare</title>
  <style>
    body {
      margin: 0;
      background-color: #111;
      color: white;
      font-family: system-ui, sans-serif;
      text-align: center;
      padding: 60px 20px;
    }

    h1 {
      font-size: 2.2rem;
      margin-bottom: 10px;
    }

    p {
      font-size: 1rem;
      color: #ccc;
      margin-bottom: 30px;
    }

    .button-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin: 20px auto 30px;
      max-width: 300px;
    }

    button {
      padding: 12px;
      font-size: 16px;
      border: none;
      border-radius: 6px;
      background-color: #333;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background-color: #555;
    }

    .stats {
      margin-top: 30px;
      font-size: 0.95rem;
      color: #ccc;
    }

    #footerLinks {
      margin-top: 40px;
      font-size: 0.85rem;
    }

    #footerLinks a {
      color: #aaa;
      margin: 0 12px;
      text-decoration: underline;
    }

    @media (min-width: 600px) {
      .button-group {
        flex-direction: row;
        justify-content: center;
      }
    }
  </style>
</head>
<body>

  <h1>QuasiCare</h1>
  <p>You are heard. You matter.</p>

  <button id="logoutBtn">Logout</button>

  <div class="button-group">
    <button onclick="location.href='talk.html'">Talk</button>
    <button onclick="location.href='listen.html'">Listen</button>
    <button onclick="location.href='replies.html'">Check Replies</button>
  </div>

  <div class="stats">
    <p>U.S. suicides in 2025: <span id="usCount">Loading...</span></p>
    <p>Global suicides in 2025: <span id="globalCount">Loading...</span></p>
  </div>

  <div id="footerLinks">
    <a href="terms.html" target="_blank">Terms</a>
    <a href="privacy.html" target="_blank">Privacy</a>
    <a href="disclaimer.html" target="_blank">Disclaimer</a>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getAuth,
      signOut,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDeHTQr0thvi-fBqIEZELFDI0VL70erlCE",
      authDomain: "quasicare.firebaseapp.com",
      databaseURL: "https://quasicare-default-rtdb.firebaseio.com",
      projectId: "quasicare",
      storageBucket: "quasicare.appspot.com",
      messagingSenderId: "197366070004",
      appId: "1:197366070004:web:2972eb9297102b6183bca1"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Handle logout
    document.getElementById("logoutBtn").addEventListener("click", async () => {
  await signOut(auth);
  alert("You’ve been logged out.");
  window.location.reload(); // or redirect to a login page if you create one
});

    // Protect route: redirect if not logged in
   onAuthStateChanged(auth, (user) => {
  if (!user) {
    console.warn("User not logged in.");
    // Do nothing — you're already on the homepage.
  }
});

    // Animate stats
    const animateCount = (id, target) => {
      let count = 0;
      const inc = target / 60;
      const interval = setInterval(() => {
        count += inc;
        if (count >= target) {
          count = target;
          clearInterval(interval);
        }
        document.getElementById(id).textContent = Math.floor(count).toLocaleString();
      }, 50);
    };

    animateCount("usCount", 21172);
    animateCount("globalCount", 308767);
  </script>
</body>
</html>
