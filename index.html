<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile • QuasiCare</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { display: flex; min-height: 100vh; font-family: system-ui; background: #111; color: #eee; }
    a { text-decoration: none; color: inherit; }
    button { cursor: pointer; }

    :root {
      --accent: #4fb8a0;
      --muted: #888;
      --bg-secondary: #1a1a1a;
    }

    .sidebar {
      width: 220px;
      background: #000;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .sidebar nav a {
      padding: 8px 0;
      font-size: 0.95rem;
      color: #ccc;
    }
    .sidebar nav a.active {
      color: var(--accent);
      font-weight: 600;
    }
    .sidebar button {
      background: var(--bg-secondary);
      color: #ccc;
      border: none;
      padding: 8px;
      margin-top: auto;
      font-size: 0.9rem;
    }

    .main {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
    }

    .profile-header {
      display: flex;
      align-items: center;
      gap: 32px;
      margin-bottom: 24px;
    }
    .avatar-wrap {
      width: 140px;
      height: 140px;
      cursor: pointer;
    }
    .avatar-wrap img.avatar {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid var(--accent);
    }

    .profile-info {
      flex: 1;
    }
    .profile-info .top {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 12px;
    }
    .profile-info .top h2 {
      font-size: 1.7rem;
      font-weight: 300;
    }
    .profile-info .stats {
      display: flex;
      gap: 28px;
      margin-bottom: 12px;
    }
    .profile-info .stats .value {
      font-weight: bold;
      color: var(--accent);
    }
    .profile-info .bio {
      font-size: 0.9rem;
      line-height: 1.4;
      margin-bottom: 16px;
    }
    .profile-info .bio .feeling {
      font-style: italic;
      color: var(--muted);
    }

    .tabs {
      display: flex;
      gap: 48px;
      justify-content: center;
      border-top: 1px solid #333;
      margin-bottom: 20px;
    }
    .tabs div {
      padding: 14px 0;
      font-size: 0.9rem;
      font-weight: 600;
      color: #ccc;
      cursor: pointer;
    }
    .tabs .active {
      color: var(--accent);
      border-top: 2px solid var(--accent);
    }

    .content-list {
      max-width: 600px;
      margin: 0 auto;
      text-align: left;
    }
    .item {
      background: var(--bg-secondary);
      padding: 16px;
      margin-bottom: 12px;
      border-radius: 8px;
    }
    .content-placeholder {
      text-align: center;
      color: #555;
      margin-top: 40px;
    }

    /* avatar picker overlay */
    #avatarPicker {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.8);
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    #avatarPicker .picker-container {
      background: #222;
      padding: 20px;
      border-radius: 8px;
      display: flex;
      gap: 16px;
    }
    #avatarPicker img.pick-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: cover;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border 0.2s;
    }
    #avatarPicker img.pick-avatar:hover {
      border: 2px solid var(--accent);
    }
  </style>
</head>
<body>

  <aside class="sidebar">
    <nav>
      <a href="index.html">Home</a>
      <a href="#">Search</a>
      <a href="#">Explore</a>
      <a href="talk.html">Talk</a>
      <a href="replies.html">Check Replies</a>
      <a href="profile.html" class="active">Profile</a>
    </nav>
    <button onclick="logout()">Logout</button>
  </aside>

  <main class="main">
    <section class="profile-header">
      <div class="avatar-wrap">
        <img id="avatar" class="avatar" src="" alt="Avatar" />
      </div>
      <div class="profile-info">
        <div class="top">
          <h2 id="username">Loading…</h2>
        </div>
        <div class="stats">
          <div><span class="value" id="postCount">0</span><span> Journals</span></div>
          <div><span class="value" id="followersCount">0</span><span> Friends</span></div>
          <div><span class="value" id="followingCount">0</span><span> Following</span></div>
        </div>
        <div class="bio">
          <div id="bioText">“Your feelings are valid.”</div>
          <div class="feeling">Today I feel: <strong id="todayFeeling">Calm</strong></div>
        </div>
      </div>
    </section>

    <section class="tabs">
      <div class="active" data-tab="journals">JOURNALS</div>
      <div data-tab="favorites">FAVORITES</div>
      <div data-tab="reflections">REFLECTIONS</div>
    </section>

    <div id="tabContent" class="content-list">
      <div class="content-placeholder">Loading...</div>
    </div>
  </main>

  <!-- Avatar Picker Overlay -->
  <div id="avatarPicker">
    <div class="picker-container">
      <img src="turn47image0_url" data-index="0" class="pick-avatar" />
      <img src="turn47image1_url" data-index="1" class="pick-avatar" />
      <img src="turn47image2_url" data-index="2" class="pick-avatar" />
      <img src="turn47image3_url" data-index="3" class="pick-avatar" />
      <img src="turn47image4_url" data-index="4" class="pick-avatar" />
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getAuth,
      onAuthStateChanged,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      getDatabase,
      ref,
      get,
      child,
      update
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = { /* your config */ };
    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getDatabase(app);

    const avatars = [
      "turn47image0_url",
      "turn47image1_url",
      "turn47image2_url",
      "turn47image3_url",
      "turn47image4_url"
    ];

    const avatarEl      = document.getElementById("avatar");
    const usernameEl    = document.getElementById("username");
    const postCountEl   = document.getElementById("postCount");
    const followersEl   = document.getElementById("followersCount");
    const followingEl   = document.getElementById("followingCount");
    const feelingEl     = document.getElementById("todayFeeling");
    const tabs          = document.querySelectorAll(".tabs div");
    const contentListEl = document.getElementById("tabContent");
    const pickerOverlay = document.getElementById("avatarPicker");
    const pickable      = document.querySelectorAll("img.pick-avatar");

    function renderList(items) {
      contentListEl.innerHTML = "";
      if (!items || items.length === 0) {
        contentListEl.innerHTML = `<div class="content-placeholder">No items in this section.</div>`;
        return;
      }
      items.forEach(it => {
        const div = document.createElement("div");
        div.className = "item";
        div.textContent = it.text || it;
        contentListEl.appendChild(div);
      });
    }

    async function loadSection(uid, section) {
      const snap = await get(child(ref(db), `users/${uid}/${section}`));
      renderList(snap.exists() ? Object.values(snap.val()) : []);
    }

    onAuthStateChanged(auth, async user => {
      if (!user) return window.location.href = "login.html";
      const uid = user.uid;
      const snap = await get(ref(db, `users/${uid}`));
      const data = snap.exists() ? snap.val() : {};

      usernameEl.textContent     = data.displayName   || user.email;
      postCountEl.textContent    = data.journals      ? Object.keys(data.journals).length   : 0;
      followersEl.textContent    = data.friends       ? Object.keys(data.friends).length    : 0;
      followingEl.textContent    = data.following     ? Object.keys(data.following).length  : 0;
      feelingEl.textContent      = data.todayFeeling  || "Unknown";

      const idx = (data.avatarIndex || 0) % avatars.length;
      avatarEl.src = avatars[idx];

      loadSection(uid, "journals");
    });

    avatarEl.addEventListener("click", () => {
      pickerOverlay.style.display = "flex";
    });

    pickable.forEach(img => {
      img.addEventListener("click", async () => {
        const idx = Number(img.dataset.index);
        avatarEl.src = avatars[idx];
        pickerOverlay.style.display = "none";
        const user = auth.currentUser;
        if (user) {
          await update(ref(db, `users/${user.uid}`), { avatarIndex: idx });
        }
      });
    });

    pickerOverlay.addEventListener("click", e => {
      if (e.target === pickerOverlay) {
        pickerOverlay.style.display = "none";
      }
    });

    window.logout = async () => {
      await signOut(auth);
      window.location.href = "login.html";
    };

    tabs.forEach(tab => {
      tab.addEventListener("click", () => {
        document.querySelector(".tabs .active").classList.remove("active");
        tab.classList.add("active");
        onAuthStateChanged(auth, user => {
          if (user) loadSection(user.uid, tab.dataset.tab);
        });
      });
    });
  </script>
</body>
</html>
