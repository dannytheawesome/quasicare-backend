<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home • QuasiCare</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { display: flex; min-height: 100vh; font-family: system-ui; background: #111; color: #eee; }
    a { text-decoration: none; color: inherit; }
    button { cursor: pointer; }

    :root {
      --accent: #4fb8a0;
      --muted: #888;
      --bg-secondary: #1a1a1a;
    }

    .sidebar {
      width: 220px;
      background: #000;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .sidebar nav a {
      padding: 8px 0;
      font-size: 0.95rem;
      color: #ccc;
    }
    .sidebar nav a.active {
      color: var(--accent);
      font-weight: 600;
    }
    .sidebar button {
      background: var(--bg-secondary);
      color: #ccc;
      border: none;
      padding: 8px;
      margin-top: auto;
      font-size: 0.9rem;
    }

    .main {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
      text-align: center;
    }

    h1 {
      font-size: 2.4rem;
      margin-bottom: 8px;
    }
    p.subtitle {
      color: var(--muted);
      margin-bottom: 32px;
      font-size: 1rem;
    }

    .stats {
      display: flex;
      gap: 40px;
      justify-content: center;
      margin-bottom: 40px;
    }
    .stats .count {
      font-size: 1.8rem;
      font-weight: bold;
      color: var(--accent);
    }
    .stats .label {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .button-group {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      justify-content: center;
      margin-bottom: 40px;
    }
    .button-group button {
      padding: 12px 24px;
      font-size: 1rem;
      border: none;
      border-radius: 6px;
      background: var(--bg-secondary);
      color: #eee;
    }
    .button-group button:hover {
      background: #333;
    }
  </style>
</head>
<body>

  <aside class="sidebar">
    <nav>
      <a href="index.html"    id="nav-home">Home</a>
      <a href="#"             id="nav-search">Search</a>
      <a href="#"             id="nav-explore">Explore</a>
      <a href="talk.html"     id="nav-talk">Talk</a>
      <a href="replies.html"  id="nav-replies">Check Replies</a>
      <a href="profile.html"  id="nav-profile">Profile</a>
    </nav>
    <button onclick="logout()">Logout</button>
  </aside>

  <main class="main">
    <h1>QuasiCare</h1>
    <p class="subtitle">You are heard. You matter.</p>

    <div class="stats">
      <div>
        <div id="usCount" class="count">0</div>
        <div class="label">U.S. Suicides (2025)</div>
      </div>
      <div>
        <div id="globalCount" class="count">0</div>
        <div class="label">Global Suicides (2025)</div>
      </div>
    </div>

    <div class="button-group">
      <button onclick="location.href='talk.html'">Talk</button>
      <button onclick="location.href='listen.html'">Listen</button>
      <button onclick="location.href='replies.html'">Check Replies</button>
      <button onclick="location.href='profile.html'">Profile</button>
    </div>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = { /* your config */ };
    initializeApp(firebaseConfig);
    const auth = getAuth();

    // Logout handler
    window.logout = async () => {
      await signOut(auth);
      window.location.href = "login.html";
    };

    // Suicide counters animation
    function animateCount(id, target) {
      const el = document.getElementById(id);
      let count = 0;
      const step = target / 60;
      const iv = setInterval(() => {
        count += step;
        if (count >= target) {
          count = target;
          clearInterval(iv);
        }
        el.textContent = Math.floor(count).toLocaleString();
      }, 50);
    }

    animateCount("usCount", 21172);
    animateCount("globalCount", 308767);

    // highlight active sidebar link
    const page = window.location.pathname.split("/").pop() || "index.html";
    const navMap = {
      "index.html":    "nav-home",
      "talk.html":     "nav-talk",
      "replies.html":  "nav-replies",
      "profile.html":  "nav-profile"
    };
    const activeId = navMap[page];
    if (activeId) {
      document.getElementById(activeId).classList.add("active");
    }
  </script>
</body>
</html>
