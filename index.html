<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuasiCare</title>
  <style>
    body {
      background-color: #111;
      color: #fff;
      font-family: system-ui, sans-serif;
      margin: 0;
      padding: 0;
      text-align: center;
    }
    h1, h2 {
      margin-top: 1em;
    }
    button {
      margin: 10px;
      padding: 12px 24px;
      background-color: #222;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
    }
    button:hover {
      background-color: #444;
    }
    textarea {
      width: 80%;
      max-width: 500px;
      padding: 10px;
      margin-top: 10px;
      background-color: #1e1e1e;
      border: 1px solid #333;
      border-radius: 6px;
      color: white;
    }
    .footer {
      margin-top: 30px;
      font-size: 14px;
    }
    .footer a {
      color: #aaa;
      text-decoration: none;
      margin: 0 10px;
    }
    .hidden {
      display: none;
    }
    #disclaimerModal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #000;
      color: #fff;
      z-index: 999;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
  </style>
</head>
<body>

  <!-- Disclaimer Modal -->
  <div id="disclaimerModal">
    <h2>Disclaimer</h2>
    <p>
      QuasiCare is an anonymous support tool. Do not submit harmful, illegal, or confidential information.
      By continuing, you agree to our
      <a href="terms.html" target="_blank">Terms of Use</a> and
      <a href="privacy.html" target="_blank">Privacy Policy</a>.
    </p>
    <button onclick="enterApp()">I Agree & Enter</button>
  </div>

  <!-- Home -->
  <div id="homeScreen" class="hidden">
    <h1>QuasiCare</h1>
    <button onclick="showSection('talkScreen')">Talk</button>
    <button onclick="showSection('listenScreen')">Listen</button>
    <button onclick="showSection('lookupScreen')">Check Replies</button>
  </div>

  <!-- Talk -->
  <div id="talkScreen" class="hidden">
    <h2>Vent Anonymously</h2>
    <textarea id="ventInput" placeholder="Type your message..."></textarea><br>
    <button onclick="submitVent()">Submit</button>
    <button onclick="showSection('homeScreen')">Exit</button>
    <div id="codeDisplay" style="margin-top: 10px;"></div>
    <div class="footer">
      <a href="terms.html" target="_blank">Terms</a> |
      <a href="privacy.html" target="_blank">Privacy</a> |
      <a href="#">Disclaimer</a>
    </div>
  </div>

  <!-- Future Screens -->
  <div id="listenScreen" class="hidden">
    <h2>Support Someone</h2>
    <div id="ventFeed">Coming soon</div>
    <button onclick="showSection('homeScreen')">Exit</button>
  </div>

  <div id="lookupScreen" class="hidden">
    <h2>Check for Replies</h2>
    <input id="lookupCode" placeholder="Enter your code..."><br>
    <div id="repliesOutput" style="margin-top: 20px;"></div>
    <button onclick="showSection('homeScreen')">Back</button>
  </div>

  <!-- Script logic -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDeHTQr0thvi-fBqIEZELFDI0VL70erlCE",
      authDomain: "quasicare.firebaseapp.com",
      databaseURL: "https://quasicare-default-rtdb.firebaseio.com",
      projectId: "quasicare",
      storageBucket: "quasicare.appspot.com",
      messagingSenderId: "197366070004",
      appId: "1:197366070004:web:2972eb9297102b6183bca1"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    window.enterApp = function () {
      document.getElementById('disclaimerModal').style.display = 'none';
      showSection('homeScreen');
    };

    window.showSection = function (id) {
      ['homeScreen', 'talkScreen', 'listenScreen', 'lookupScreen'].forEach(section => {
        document.getElementById(section).classList.add('hidden');
      });
      document.getElementById(id).classList.remove('hidden');
    };

    window.submitVent = async function () {
      const input = document.getElementById("ventInput");
      const message = input.value.trim();
      if (!message) return alert("Please write something.");

      const code = Math.random().toString(36).substring(2, 8).toUpperCase();
      await set(ref(db, `vents/${code}`), {
        message,
        reply: null,
        timestamp: Date.now()
      });

      document.getElementById("codeDisplay").innerText =
        `Your anonymous code: ${code}. Save this to check replies later.`;
      input.value = "";
    };
  </script>
</body>
</html>
