<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QuasiCare</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background-color: #111;
      color: #fff;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
      font-size: 2rem;
    }

    button, input, textarea {
      padding: 12px;
      font-size: 16px;
      margin: 10px;
      border: none;
      border-radius: 6px;
      transition: background-color 0.3s ease;
    }

    input, textarea {
      width: 80%;
      max-width: 350px;
      background: #1e1e1e;
      color: #fff;
      border: 1px solid #444;
    }

    button {
      background-color: #333;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background-color: #555;
    }

    .hidden {
      display: none;
    }

    .section {
      margin-top: 20px;
    }

    .loading {
      border: 4px solid #333;
      border-top: 4px solid #00f2ff;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      margin: 20px auto;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .stats {
      margin-top: 20px;
      font-size: 1rem;
      color: #ccc;
    }

    #footerLinks {
      font-size: 0.8rem;
      color: #888;
      margin-top: 40px;
    }

    #footerLinks a {
      color: #888;
      margin: 0 10px;
      text-decoration: underline;
    }

    .fade {
      transition: all 0.4s ease-in-out;
    }

    #adminPanel {
      display: none;
    }
  </style>
</head>
<body>

  <!-- Authentication -->
  <div id="authScreen">
    <h1>Welcome to QuasiCare</h1>
    <p>Your voice matters. You're not alone.</p>
    <input type="email" id="authEmail" placeholder="Email" /><br>
    <input type="password" id="authPassword" placeholder="Password" /><br>
    <button onclick="register()">Register</button>
    <button onclick="login()">Login</button>
    <p id="authMessage" style="color: red;"></p>
  </div>

  <!-- Main App -->
  <div id="mainApp" class="hidden fade">
    <h1>QuasiCare</h1>
    <p id="welcomeText">You are heard. You matter.</p>
    <button onclick="logout()">Logout</button>

    <!-- Main Action Buttons -->
    <div class="section">
      <button onclick="openVent()">Talk</button>
      <button onclick="openListen()">Listen</button>
      <button onclick="openReplies()">Check Replies</button>
    </div>

    <!-- Vent -->
    <div id="ventBox" class="hidden section fade">
      <textarea id="ventInput" rows="4" placeholder="Type your anonymous message..."></textarea><br>
      <button onclick="submitMessage()">Submit</button>
      <button onclick="resetBoxes()">Exit</button>
    </div>

    <!-- Listen -->
    <div id="responseBox" class="hidden section fade">
      <div id="ventDisplay"><div class="loading"></div></div>
      <button onclick="resetBoxes()">Back</button>
    </div>

    <!-- Reply Lookup -->
    <div id="replyBox" class="hidden section fade">
      <input type="text" id="lookupCode" placeholder="Enter your unique code" /><br>
      <div id="replyResult"></div>
      <button onclick="resetBoxes()">Back</button>
    </div>

    <!-- Suicide Stats -->
    <div class="stats">
      <p>U.S. suicides in 2025: <span id="usCount">Loading...</span></p>
      <p>Global suicides in 2025: <span id="globalCount">Loading...</span></p>
    </div>
  </div>

  <!-- Legal -->
  <div id="footerLinks">
    <a href="/terms" target="_blank">Terms</a>
    <a href="/privacy" target="_blank">Privacy</a>
    <a href="/disclaimer" target="_blank">Disclaimer</a>
  </div>

  <!-- Admin (Hidden) -->
  <div id="adminPanel">
    <h2>Admin Panel</h2>
    <p>This section is hidden from users.</p>
  </div>

  <!-- Scripts -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getDatabase, ref, push, onChildAdded, get, child
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
    import {
      getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDeHTQr0thvi-fBqIEZELFDI0VL70erlCE",
      authDomain: "quasicare.firebaseapp.com",
      databaseURL: "https://quasicare-default-rtdb.firebaseio.com",
      projectId: "quasicare",
      storageBucket: "quasicare.appspot.com",
      messagingSenderId: "197366070004",
      appId: "1:197366070004:web:2972eb9297102b6183bca1"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    const authScreen = document.getElementById("authScreen");
    const mainApp = document.getElementById("mainApp");
    const authMsg = document.getElementById("authMessage");

    // Auth
    window.register = async function () {
      const email = document.getElementById("authEmail").value;
      const pass = document.getElementById("authPassword").value;
      try {
        await createUserWithEmailAndPassword(auth, email, pass);
      } catch (e) {
        authMsg.textContent = e.code.includes("email") ? "Invalid email" : e.message;
      }
    };

    window.login = async function () {
      const email = document.getElementById("authEmail").value;
      const pass = document.getElementById("authPassword").value;
      try {
        await signInWithEmailAndPassword(auth, email, pass);
      } catch (e) {
        authMsg.textContent = "Wrong email or password.";
      }
    };

    window.logout = async function () {
      await signOut(auth);
    };

    onAuthStateChanged(auth, user => {
      if (user) {
        authScreen.classList.add("hidden");
        mainApp.classList.remove("hidden");
      } else {
        authScreen.classList.remove("hidden");
        mainApp.classList.add("hidden");
      }
    });

    // Buttons
    window.openVent = () => {
      resetBoxes();
      document.getElementById("ventBox").classList.remove("hidden");
    };

    window.openListen = () => {
      resetBoxes();
      document.getElementById("responseBox").classList.remove("hidden");
      const display = document.getElementById("ventDisplay");
      display.innerHTML = "<div class='loading'></div>";
      const messagesRef = ref(db, "vents");
      onChildAdded(messagesRef, (data) => {
        const post = data.val().message;
        display.innerHTML = `<strong>Anonymous Post:</strong><br>"${post}"`;
      });
    };

    window.openReplies = () => {
      resetBoxes();
      document.getElementById("replyBox").classList.remove("hidden");
    };

    window.resetBoxes = () => {
      ["ventBox", "responseBox", "replyBox"].forEach(id => {
        document.getElementById(id).classList.add("hidden");
      });
    };

    window.submitMessage = async function () {
      const input = document.getElementById("ventInput");
      const message = input.value.trim();
      if (!message) return alert("Please enter a message.");

      const newPostRef = push(ref(db, "vents"));
      const code = newPostRef.key;

      await push(ref(db, "replies/" + code), {
        message: message,
        timestamp: Date.now()
      });

      alert("Message submitted. Your code is: " + code);
      input.value = "";
      resetBoxes();
    };

    // Replies
    const replyResult = document.getElementById("replyResult");
    document.getElementById("lookupCode").addEventListener("change", async (e) => {
      const code = e.target.value.trim();
      if (!code) return;
      const snap = await get(child(ref(db), "replies/" + code));
      if (snap.exists()) {
        replyResult.innerHTML = `<p>"${snap.val()[Object.keys(snap.val())[0]].message}"</p>`;
      } else {
        replyResult.innerHTML = "<p>No replies found.</p>";
      }
    });

    // Stats with animation
    const animateCount = (id, target) => {
      let count = 0;
      const inc = target / 60;
      const interval = setInterval(() => {
        count += inc;
        if (count >= target) {
          count = target;
          clearInterval(interval);
        }
        document.getElementById(id).textContent = Math.floor(count).toLocaleString();
      }, 50);
    };

    animateCount("usCount", 21172);
    animateCount("globalCount", 308767);
  </script>
</body>
</html>
