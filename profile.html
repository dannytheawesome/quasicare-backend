<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Your Profile | QuasiCare</title>
  <style>
    body {
      background-color: #111;
      color: white;
      font-family: system-ui, sans-serif;
      text-align: center;
      padding: 40px 20px;
    }
    img {
      border-radius: 50%;
      width: 120px;
      height: 120px;
      object-fit: cover;
      margin-bottom: 15px;
    }
    input, button {
      margin: 10px;
      padding: 10px;
      font-size: 16px;
      border-radius: 6px;
      border: none;
    }
    input[type="file"] {
      color: white;
    }
    #logoutBtn {
      background-color: #333;
      color: white;
      cursor: pointer;
    }
    #logoutBtn:hover {
      background-color: #555;
    }
  </style>
</head>
<body>
  <h1>Your Profile</h1>
  <img id="profilePic" src="" alt="Profile Picture" />
  <div>
    <input type="text" id="username" placeholder="Display Name" /><br>
    <input type="file" id="photoUpload" accept="image/*" /><br>
    <button onclick="updateProfile()">Save Changes</button>
  </div>
  <p><strong>Email:</strong> <span id="userEmail">Loading...</span></p>
  <p><strong>Total Replies:</strong> <span id="points">0</span></p>
  <p><strong>Badges:</strong> <span id="badges">None</span></p>
  <br>
  <button id="logoutBtn">Logout</button>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getAuth,
      onAuthStateChanged,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      getDatabase,
      ref,
      set,
      get,
      update
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDeHTQr0thvi-fBqIEZELFDI0VL70erlCE",
      authDomain: "quasicare.firebaseapp.com",
      databaseURL: "https://quasicare-default-rtdb.firebaseio.com",
      projectId: "quasicare",
      storageBucket: "quasicare.appspot.com",
      messagingSenderId: "197366070004",
      appId: "1:197366070004:web:2972eb9297102b6183bca1"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    const profilePic = document.getElementById("profilePic");
    const userEmail = document.getElementById("userEmail");
    const username = document.getElementById("username");
    const photoUpload = document.getElementById("photoUpload");
    const points = document.getElementById("points");
    const badges = document.getElementById("badges");

    let currentUid = null;

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "login.html";
        return;
      }

      currentUid = user.uid;
      userEmail.textContent = user.email;

      const userRef = ref(db, "users/" + currentUid);
      const snapshot = await get(userRef);

      if (snapshot.exists()) {
        const data = snapshot.val();
        username.value = data.username || "";
        profilePic.src = data.photoURL || "https://via.placeholder.com/120";
        points.textContent = data.points || 0;
        badges.textContent = data.badge || "None";
      } else {
        profilePic.src = "https://via.placeholder.com/120";
      }
    });

    window.updateProfile = async function () {
      const name = username.value.trim();
      const file = photoUpload.files[0];
      let photoURL = profilePic.src;

      if (file) {
        // For MVP, use Base64 inline image instead of uploading to storage
        const reader = new FileReader();
        reader.onloadend = async () => {
          photoURL = reader.result;

          await saveData(name, photoURL);
        };
        reader.readAsDataURL(file);
      } else {
        await saveData(name, photoURL);
      }
    };

    async function saveData(name, photoURL) {
      await update(ref(db, "users/" + currentUid), {
        username: name,
        photoURL: photoURL
      });
      alert("Profile updated!");
      profilePic.src = photoURL;
    }

    document.getElementById("logoutBtn").addEventListener("click", async () => {
      await signOut(auth);
      window.location.href = "login.html";
    });
  </script>
</body>
</html>
