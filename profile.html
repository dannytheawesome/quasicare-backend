<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile • QuasiCare</title>
  <style>
    /* reset and base */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex;
      min-height: 100vh;
      font-family: system-ui, sans-serif;
      background: #111;
      color: #fff;
    }
    a { text-decoration: none; color: inherit; }
    button { cursor: pointer; }

    /* sidebar */
    .sidebar {
      width: 240px;
      background: #000;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .sidebar nav a {
      padding: 10px 0;
      font-size: 1rem;
    }

    /* main content */
    .main {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
    }

    /* header */
    .profile-header {
      display: flex;
      align-items: center;
      gap: 40px;
      margin-bottom: 30px;
    }
    .profile-header img.avatar {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #333;
    }
    .profile-info {
      flex: 1;
    }
    .profile-info .top {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 16px;
    }
    .profile-info .top h2 {
      font-size: 1.6rem;
      font-weight: 300;
    }
    .profile-info .top button {
      padding: 6px 12px;
      background: #222;
      border: 1px solid #444;
      border-radius: 4px;
      font-size: 0.9rem;
      font-weight: 600;
    }
    .profile-info .stats {
      display: flex;
      gap: 24px;
      margin-bottom: 16px;
    }
    .profile-info .stats div {
      display: flex;
      gap: 6px;
      align-items: baseline;
    }
    .profile-info .stats .value {
      font-weight: bold;
    }
    .profile-info .bio {
      font-size: 0.9rem;
      line-height: 1.4;
    }

    /* story highlights */
    .highlights {
      display: flex;
      gap: 16px;
      margin-bottom: 30px;
      overflow-x: auto;
    }
    .highlight {
      text-align: center;
      font-size: 0.8rem;
    }
    .highlight img {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #333;
      margin-bottom: 6px;
    }

    /* tabs */
    .tabs {
      display: flex;
      gap: 60px;
      justify-content: center;
      border-top: 1px solid #333;
      margin-bottom: 20px;
    }
    .tabs div {
      padding: 16px 0;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
    }
    .tabs .active {
      border-top: 1px solid #fff;
    }

    /* placeholder content */
    .content-placeholder {
      text-align: center;
      margin-top: 60px;
      color: #777;
      font-size: 1rem;
    }
  </style>
</head>
<body>

  <!-- sidebar -->
  <aside class="sidebar">
    <nav>
      <a href="index.html">Home</a>
      <a href="#">Search</a>
      <a href="#">Explore</a>
      <a href="#">Reels</a>
      <a href="messages.html">Messages</a>
      <a href="notifications.html">Notifications</a>
      <a href="create.html">Create</a>
      <a href="dashboard.html">Dashboard</a>
      <a href="profile.html" style="font-weight: bold;">Profile</a>
    </nav>
    <button onclick="logout()" style="margin-top: auto;">Logout</button>
  </aside>

  <!-- main profile area -->
  <main class="main">
    <section class="profile-header">
      <img id="avatar" class="avatar" src="" alt="Profile Picture" />
      <div class="profile-info">
        <div class="top">
          <h2 id="username">Loading...</h2>
          <button id="editProfileBtn">Edit Profile</button>
        </div>
        <div class="stats">
          <div><span class="value" id="postCount">0</span><span>posts</span></div>
          <div><span class="value" id="followersCount">0</span><span>followers</span></div>
          <div><span class="value" id="followingCount">0</span><span>following</span></div>
        </div>
        <div class="bio">
          <div id="bioText">Nonprofit organization<br>Chicago 🇺🇸 | carpe diem</div>
          <a href="https://quasilegalinstitute.org" target="_blank" id="profileLink">quasilegalinstitute.org</a>
        </div>
      </div>
    </section>

    <!-- story highlights -->
    <section class="highlights" id="highlights">
      <!-- examples -->
      <div class="highlight">
        <img src="https://via.placeholder.com/80" alt="Highlight">
        <div>Chicago</div>
      </div>
      <div class="highlight">
        <img src="https://via.placeholder.com/80" alt="Highlight">
        <div>Madison</div>
      </div>
      <div class="highlight">
        <img src="https://via.placeholder.com/80" alt="Highlight">
        <div>Pets</div>
      </div>
      <div class="highlight">
        <div style="width:80px;height:80px;border-radius:50%;border:2px solid #333;display:flex;align-items:center;justify-content:center;font-size:2rem;">+</div>
        <div>New</div>
      </div>
    </section>

    <!-- tabs -->
    <section class="tabs">
      <div class="active" data-tab="posts">POSTS</div>
      <div data-tab="saved">SAVED</div>
      <div data-tab="tagged">TAGGED</div>
    </section>

    <!-- content placeholder -->
    <div id="tabContent" class="content-placeholder">
      Share your first post
    </div>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDeHTQr0thvi-fBqIEZELFDI0VL70erlCE",
      authDomain: "quasicare.firebaseapp.com",
      databaseURL: "https://quasicare-default-rtdb.firebaseio.com",
      projectId: "quasicare",
      storageBucket: "quasicare.appspot.com",
      messagingSenderId: "197366070004",
      appId: "1:197366070004:web:2972eb9297102b6183bca1"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    const avatarEl = document.getElementById("avatar");
    const usernameEl = document.getElementById("username");
    const postCountEl = document.getElementById("postCount");
    const followersEl = document.getElementById("followersCount");
    const followingEl = document.getElementById("followingCount");

    onAuthStateChanged(auth, async user => {
      if (!user) return window.location.href = "login.html";
      const snap = await get(ref(db, `users/${user.uid}`));
      const data = snap.exists() ? snap.val() : {};
      avatarEl.src = data.photoURL || "https://via.placeholder.com/150";
      usernameEl.textContent = data.displayName || user.email;
      postCountEl.textContent = data.posts || 0;
      followersEl.textContent = data.followers || 0;
      followingEl.textContent = data.following || 0;
    });

    window.logout = async () => {
      await signOut(auth);
      window.location.href = "login.html";
    };

    // simple tab switching
    document.querySelectorAll(".tabs div").forEach(tab => {
      tab.addEventListener("click", () => {
        document.querySelector(".tabs .active").classList.remove("active");
        tab.classList.add("active");
        const name = tab.dataset.tab;
        const content = {
          posts: "Share your first post",
          saved: "No saved items",
          tagged: "No tagged posts"
        };
        document.getElementById("tabContent").textContent = content[name];
      });
    });
  </script>
</body>
</html>
