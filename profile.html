<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile • QuasiCare</title>
  <style>
    body {
      margin: 0;
      display: flex;
      background: #111;
      color: #eee;
      font-family: system-ui, sans-serif;
    }
    .sidebar {
      width: 220px;
      background: #000;
      padding: 20px;
      display: flex;
      flex-direction: column;
    }
    .sidebar nav a {
      display: block;
      margin: 8px 0;
      color: #ccc;
      text-decoration: none;
    }
    .sidebar nav a.active {
      color: #4fb8a0;
      font-weight: 600;
    }
    .main {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
    }
    .profile-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 20px;
    }
    .avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 3px solid #4fb8a0;
      object-fit: cover;
    }
    #verified {
      color: #4fb8a0;
      font-weight: 700;
      margin-top: 5px;
    }
    .stats {
      display: flex;
      gap: 24px;
      margin: 10px 0;
    }
    .tabs {
      display: flex;
      gap: 24px;
      justify-content: center;
      border-bottom: 1px solid #333;
      margin: 20px 0;
    }
    .tabs div {
      padding: 10px;
      cursor: pointer;
      color: #ccc;
    }
    .tabs .active {
      color: #4fb8a0;
      border-bottom: 2px solid #4fb8a0;
    }
    #tabContent {
      max-width: 600px;
      margin: auto;
    }
    .journal-entry {
      background: #1a1a1a;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 6px;
    }
    #newJournalInput {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      background: #222;
      color: white;
      border: none;
      border-radius: 6px;
    }
    #submitJournalBtn {
      padding: 8px 16px;
      background: #4fb8a0;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <aside class="sidebar">
    <nav>
      <a href="index.html">Home</a>
      <a href="#">Search</a>
      <a href="#">Explore</a>
      <a href="talk.html">Talk</a>
      <a href="replies.html">Check Replies</a>
      <a class="active" href="profile.html">Profile</a>
    </nav>
    <button onclick="logout()">Logout</button>
  </aside>

  <main class="main">
    <section class="profile-header">
      <img id="avatar" class="avatar" src="" alt="Profile Picture" />
      <h2 id="encouragement">You are heard. You matter.</h2>
      <div id="verified" style="display:none;">Verified ✓</div>
      <div class="stats">
        <div><span id="journalCount">0</span> Journals</div>
        <div><span id="helpedCount">0</span> Helped</div>
        <div><span id="badgeCount">0</span> Badges</div>
      </div>
      <div><em>Today I feel: <span id="feeling">---</span></em></div>
    </section>

    <section class="tabs">
      <div class="active" data-tab="journals">JOURNALS</div>
      <div data-tab="favorites">FAVORITES</div>
      <div data-tab="reflections">REFLECTIONS</div>
    </section>

    <div id="tabContent">
      <textarea id="newJournalInput" placeholder="Write your journal..."></textarea>
      <button id="submitJournalBtn">Submit</button>
      <div id="journalList"></div>
    </div>
  </main>

  <script type="module" src="profile.js"></script>
</body>
</html>
