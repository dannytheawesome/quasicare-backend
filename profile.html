<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile • QuasiCare</title>
  <style>
    :root {
      --accent: #4fb8a0;
      --muted: #aaa;
      --bg: #111;
      --fg: #eee;
      --bg-secondary: #1c1c1c;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      min-height: 100vh;
      font-family: system-ui, sans-serif;
      background: var(--bg);
      color: var(--fg);
    }

    .sidebar {
      width: 220px;
      background: #000;
      padding: 20px;
      display: flex;
      flex-direction: column;
    }

    .sidebar nav a {
      color: #ccc;
      font-size: 0.95rem;
      padding: 8px 0;
      text-decoration: none;
    }

    .sidebar nav a.active {
      color: var(--accent);
      font-weight: 600;
    }

    .sidebar button {
      margin-top: auto;
      background: var(--bg-secondary);
      border: none;
      color: #ccc;
      padding: 8px;
      cursor: pointer;
    }

    .main {
      flex: 1;
      padding: 30px 20px;
      overflow-y: auto;
    }

    .profile-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      margin-bottom: 30px;
    }

    .avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 3px solid var(--accent);
      object-fit: cover;
    }

    .verified {
      margin-top: 4px;
      color: #4fa9f7;
      font-weight: 600;
    }

    h2 {
      margin-top: 12px;
      font-size: 1.6rem;
      font-weight: 400;
    }

    .stats {
      display: flex;
      gap: 30px;
      margin-top: 12px;
      font-size: 0.95rem;
    }

    .stats .value {
      font-weight: bold;
      color: var(--accent);
    }

    .feeling {
      font-style: italic;
      color: var(--muted);
      margin-top: 10px;
    }

    .tabs {
      display: flex;
      justify-content: center;
      gap: 30px;
      border-top: 1px solid #333;
      margin-bottom: 20px;
    }

    .tabs div {
      padding: 14px 0;
      font-size: 0.9rem;
      font-weight: 600;
      color: #ccc;
      cursor: pointer;
    }

    .tabs .active {
      color: var(--accent);
      border-top: 2px solid var(--accent);
    }

    .content-list {
      max-width: 600px;
      margin: 0 auto;
      text-align: left;
    }

    .item {
      background: var(--bg-secondary);
      padding: 16px;
      margin-bottom: 12px;
      border-radius: 8px;
    }

    .placeholder {
      text-align: center;
      color: #666;
      margin-top: 40px;
    }

    #newJournalInput {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      background: #222;
      color: white;
      border: none;
      border-radius: 6px;
    }

    #submitJournalBtn {
      padding: 8px 16px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <aside class="sidebar">
    <nav>
      <a href="index.html">Home</a>
      <a href="#">Search</a>
      <a href="#">Explore</a>
      <a href="talk.html">Talk</a>
      <a href="replies.html">Check Replies</a>
      <a class="active" href="profile.html">Profile</a>
    </nav>
    <button onclick="logout()">Logout</button>
  </aside>

  <main class="main">
    <section class="profile-header">
      <img id="avatar" class="avatar" src="avatars/animal1.png" alt="Avatar" />
      <h2 id="encouragement">You are heard. You matter.</h2>
      <div id="verified" class="verified" style="display:none;">Verified ✓</div>
      <div class="stats">
        <div><span class="value" id="journalCount">0</span> Journals</div>
        <div><span class="value" id="helpedCount">0</span> Helped</div>
        <div><span class="value" id="badgeCount">0</span> Badges</div>
      </div>
      <div class="feeling">Today I feel: <span id="feeling">—</span></div>
    </section>

    <section class="tabs">
      <div class="active" data-tab="journals">JOURNALS</div>
      <div data-tab="favorites">FAVORITES</div>
      <div data-tab="reflections">REFLECTIONS</div>
    </section>

    <div id="tabContent" class="content-list">
      <textarea id="newJournalInput" placeholder="Write your journal..."></textarea>
      <button id="submitJournalBtn">Submit</button>
      <div id="journalList"></div>
    </div>
  </main>

  <script type="module" src="profile.js"></script>
</body>
</html>
