<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile • QuasiCare</title>
  <style>
    /* reset and base */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex;
      min-height: 100vh;
      font-family: system-ui, sans-serif;
      background: #111;
      color: #eee;
    }
    a { text-decoration: none; color: inherit; }
    button { cursor: pointer; }

    /* therapeutic accent */
    :root {
      --accent: #4fb8a0; /* soft teal */
      --muted: #888;
      --bg-secondary: #1a1a1a;
    }

    /* sidebar */
    .sidebar {
      width: 220px;
      background: #000;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .sidebar nav a {
      padding: 8px 0;
      font-size: 0.95rem;
      color: #ccc;
    }
    .sidebar nav a.active {
      color: var(--accent);
      font-weight: 600;
    }

    /* main content */
    .main {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
    }

    /* header */
    .profile-header {
      display: flex;
      align-items: center;
      gap: 32px;
      margin-bottom: 24px;
    }
    .profile-header .avatar-wrap {
      position: relative;
      width: 140px;
      height: 140px;
    }
    .profile-header img.avatar {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid var(--accent);
    }
    /* mood ring: top-right small circle */
    .profile-header .mood-indicator {
      position: absolute;
      top: 0;
      right: 0;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #f5c259; /* e.g., happy mood */
      border: 3px solid #111;
    }

    .profile-info {
      flex: 1;
    }
    .profile-info .top {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 12px;
    }
    .profile-info .top h2 {
      font-size: 1.7rem;
      font-weight: 300;
    }
    .profile-info .top button {
      padding: 6px 14px;
      background: var(--bg-secondary);
      border: 1px solid #333;
      border-radius: 4px;
      font-size: 0.9rem;
      font-weight: 500;
      color: #eee;
    }
    .profile-info .stats {
      display: flex;
      gap: 28px;
      margin-bottom: 12px;
    }
    .profile-info .stats div {
      display: flex;
      gap: 6px;
      align-items: baseline;
    }
    .profile-info .stats .value {
      font-weight: bold;
      color: var(--accent);
    }
    .profile-info .bio {
      font-size: 0.9rem;
      line-height: 1.4;
      margin-bottom: 16px;
    }
    .profile-info .bio .feeling {
      font-style: italic;
      color: var(--muted);
    }

    /* story highlights */
    .highlights {
      display: flex;
      gap: 14px;
      margin-bottom: 28px;
      overflow-x: auto;
    }
    .highlight {
      text-align: center;
      font-size: 0.8rem;
      color: #ccc;
    }
    .highlight img, .highlight .new-icon {
      width: 70px; height: 70px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--bg-secondary);
      margin-bottom: 4px;
    }
    .highlight .new-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      color: var(--muted);
      background: var(--bg-secondary);
    }

    /* tabs */
    .tabs {
      display: flex;
      gap: 48px;
      justify-content: center;
      border-top: 1px solid #333;
      margin-bottom: 20px;
    }
    .tabs div {
      padding: 14px 0;
      font-size: 0.9rem;
      font-weight: 600;
      color: #ccc;
      cursor: pointer;
    }
    .tabs .active {
      color: var(--accent);
      border-top: 2px solid var(--accent);
    }

    /* placeholder content */
    .content-placeholder {
      text-align: center;
      margin-top: 48px;
      color: #555;
      font-size: 1rem;
    }
  </style>
</head>
<body>

  <!-- sidebar -->
  <aside class="sidebar">
    <nav>
      <a href="index.html">Home</a>
      <a href="#">Search</a>
      <a href="#">Explore</a>
      <a href="messages.html">Messages</a>
      <a href="replies.html">Check Replies</a>
      <a href="profile.html" class="active">Profile</a>
    </nav>
    <button onclick="logout()" style="margin-top: auto; background: var(--bg-secondary); color: #ccc; border: none; padding: 8px;">Logout</button>
  </aside>

  <!-- main profile area -->
  <main class="main">
    <section class="profile-header">
      <div class="avatar-wrap">
        <img id="avatar" class="avatar" src="" alt="Profile Picture" />
        <div class="mood-indicator" title="Feeling: Happy"></div>
      </div>
      <div class="profile-info">
        <div class="top">
          <h2 id="username">Loading…</h2>
          <button id="editProfileBtn">Edit Profile</button>
        </div>
        <div class="stats">
          <div><span class="value" id="postCount">0</span><span>Journals</span></div>
          <div><span class="value" id="followersCount">0</span><span>Friends</span></div>
          <div><span class="value" id="followingCount">0</span><span>Following</span></div>
        </div>
        <div class="bio">
          <div id="bioText">“Your feelings are valid.”</div>
          <div class="feeling">Today I feel: <strong id="todayFeeling">Calm</strong></div>
        </div>
      </div>
    </section>

    <!-- story highlights -->
    <section class="highlights">
      <div class="highlight">
        <img src="https://via.placeholder.com/80?text=😊" alt="Self-care">
        <div>Self-care</div>
      </div>
      <div class="highlight">
        <img src="https://via.placeholder.com/80?text=✍️" alt="Journals">
        <div>Journals</div>
      </div>
      <div class="highlight">
        <img src="https://via.placeholder.com/80?text=💬" alt="Support">
        <div>Support</div>
      </div>
      <div class="highlight">
        <div class="new-icon">+</div>
        <div>New</div>
      </div>
    </section>

    <!-- tabs -->
    <section class="tabs">
      <div class="active" data-tab="journals">JOURNALS</div>
      <div data-tab="favorites">FAVORITES</div>
      <div data-tab="reflections">REFLECTIONS</div>
    </section>

    <!-- content placeholder -->
    <div id="tabContent" class="content-placeholder">
      You haven’t added any journals yet.
    </div>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = { /* your config */ };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    const avatarEl = document.getElementById("avatar");
    const usernameEl = document.getElementById("username");
    const postCountEl = document.getElementById("postCount");
    const followersEl = document.getElementById("followersCount");
    const followingEl = document.getElementById("followingCount");
    const feelingEl = document.getElementById("todayFeeling");

    onAuthStateChanged(auth, async user => {
      if (!user) return window.location.href = "login.html";
      const snap = await get(ref(db, `users/${user.uid}`));
      const data = snap.exists() ? snap.val() : {};

      avatarEl.src         = data.photoURL || "https://via.placeholder.com/150";
      usernameEl.textContent = data.displayName || user.email;
      postCountEl.textContent = data.posts || 0;
      followersEl.textContent = data.friends || 0;
      followingEl.textContent = data.following || 0;
      feelingEl.textContent = data.todayFeeling || "Unknown";
    });

    window.logout = async () => {
      await signOut(auth);
      window.location.href = "login.html";
    };

    // tab switching
    document.querySelectorAll(".tabs div").forEach(tab => {
      tab.addEventListener("click", () => {
        document.querySelector(".tabs .active").classList.remove("active");
        tab.classList.add("active");
        const key = tab.dataset.tab;
        const messages = {
          journals: "You haven’t added any journals yet.",
          favorites: "No favorites saved.",
          reflections: "No reflections posted."
        };
        document.getElementById("tabContent").textContent = messages[key];
      });
    });
  </script>
</body>
</html>
