<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Profile | QuasiCare</title>
  <style>
    body {
      background-color: #111;
      color: white;
      font-family: system-ui, sans-serif;
      text-align: center;
      padding: 30px;
    }

    .profile-pic {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #555;
      margin: 10px auto;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 5px;
    }

    .username {
      font-size: 1.2rem;
      margin-bottom: 10px;
      color: #ccc;
    }

    .stats {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin: 20px 0;
    }

    .stat-box {
      font-size: 1rem;
    }

    .edit-section {
      margin: 20px 0;
    }

    input[type="text"], input[type="file"] {
      margin: 10px auto;
      padding: 8px;
      background: #222;
      color: white;
      border: 1px solid #444;
      border-radius: 4px;
      width: 250px;
    }

    button {
      padding: 10px 20px;
      background-color: #333;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 10px;
    }

    .badges {
      margin-top: 20px;
    }

    .badge {
      display: inline-block;
      background-color: #222;
      border: 1px solid #555;
      padding: 6px 12px;
      margin: 5px;
      border-radius: 12px;
      font-size: 0.9rem;
    }

    .footer {
      margin-top: 40px;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <h1>Your Profile</h1>

  <img id="profilePic" src="" alt="Profile Picture" class="profile-pic" />
  <div class="username" id="displayName">Loading...</div>

  <div class="stats">
    <div class="stat-box"><strong>Replies</strong><br><span id="replyCount">0</span></div>
    <div class="stat-box"><strong>Badges</strong><br><span id="badgeCount">None</span></div>
  </div>

  <div class="edit-section">
    <input type="text" id="nameInput" placeholder="Update name" /><br>
    <input type="file" id="picInput" accept="image/*" /><br>
    <button onclick="saveProfile()">Save Changes</button>
  </div>

  <div class="badges" id="badgeList"></div>

  <button onclick="logout()">Logout</button>

  <div class="footer">
    <p><a href="index.html" style="color: #888; text-decoration: underline;">Back to Home</a></p>
  </div>

  <script type="module">
    // Firebase logic will go here after layout
  </script>
</body>
</html>
