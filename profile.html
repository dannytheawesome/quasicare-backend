<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Your Profile | QuasiCare</title>
  <style>
    body {
      background-color: #111;
      color: white;
      font-family: system-ui, sans-serif;
      text-align: center;
      padding: 40px 20px;
    }
    input {
      padding: 10px;
      margin: 10px;
      background-color: #222;
      color: white;
      border: none;
      border-radius: 6px;
      width: 80%;
      max-width: 300px;
    }
    button {
      padding: 10px 20px;
      background-color: #333;
      color: white;
      border: none;
      border-radius: 6px;
      margin-top: 10px;
      cursor: pointer;
    }
    button:hover {
      background-color: #555;
    }
    img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <h1>Your Profile</h1>
  <p>Email: <span id="email">Loading...</span></p>
  <img id="profilePic" src="" alt="Profile Photo" style="display: none;" />
  
  <p>Username: <span id="username">Loading...</span></p>
  <p>Points: <span id="points">0</span></p>
  <p>Badges: <span id="badges">None</span></p>

  <h3>Edit Profile</h3>
  <input type="text" id="newUsername" placeholder="New username" /><br>
  <input type="text" id="newPhotoURL" placeholder="Profile photo URL (optional)" /><br>
  <button onclick="saveProfile()">Save Changes</button><br><br>
  <button onclick="location.href='index.html'">⬅ Back to Home</button>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getAuth,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      getDatabase,
      ref,
      get,
      set
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDeHTQr0thvi-fBqIEZELFDI0VL70erlCE",
      authDomain: "quasicare.firebaseapp.com",
      databaseURL: "https://quasicare-default-rtdb.firebaseio.com",
      projectId: "quasicare",
      storageBucket: "quasicare.appspot.com",
      messagingSenderId: "197366070004",
      appId: "1:197366070004:web:2972eb9297102b6183bca1"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    let uid = null;

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        alert("You must be logged in to view this page.");
        window.location.href = "login.html";
        return;
      }

      uid = user.uid;
      document.getElementById("email").textContent = user.email;

      const profileRef = ref(db, "users/" + uid);
      const snapshot = await get(profileRef);

      if (snapshot.exists()) {
        const data = snapshot.val();
        document.getElementById("username").textContent = data.username || "Anonymous";
        document.getElementById("points").textContent = data.points || 0;
        document.getElementById("badges").textContent = (data.badges && data.badges.length > 0)
          ? data.badges.join(", ") : "None";

        if (data.photoURL) {
          const img = document.getElementById("profilePic");
          img.src = data.photoURL;
          img.style.display = "block";
        }
      }
    });

    window.saveProfile = async function () {
      const username = document.getElementById("newUsername").value.trim();
      const photoURL = document.getElementById("newPhotoURL").value.trim();
      if (!username) return alert("Username cannot be empty.");

      const updates = { username: username };
      if (photoURL) updates.photoURL = photoURL;

      try {
        await set(ref(db, "users/" + uid), {
          ...updates,
          points: parseInt(document.getElementById("points").textContent),
          badges: document.getElementById("badges").textContent === "None"
            ? [] : document.getElementById("badges").textContent.split(", ")
        });
        alert("Profile updated.");
        window.location.reload();
      } catch (err) {
        console.error(err);
        alert("Failed to save profile.");
      }
    };
  </script>
</body>
</html>
